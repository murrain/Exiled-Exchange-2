name: Build

on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - 'docs/**'
      - README.md

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - uses: actions/setup-python@v6
    - run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-composite0-dev libxcb-randr0-dev libxtst-dev libxkbcommon-dev
    - run: npm ci
      working-directory: ./renderer
    - run: npm ci
      working-directory: ./main
    - uses: pre-commit/action@v3.0.1
    - run: npm run make-index-files
      working-directory: ./renderer
    - run: npm run test
      working-directory: ./renderer

  renderer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - run: npm ci
      working-directory: ./renderer
    - run: npm run make-index-files
      working-directory: ./renderer
    - run: npm run build
      working-directory: ./renderer
    - uses: actions/upload-artifact@v4
      with:
        name: renderer-dist
        path: ./renderer/dist
        retention-days: 1

  package:
    needs: [test, renderer]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
    - run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxcb-composite0-dev libxcb-randr0-dev libxtst-dev libxkbcommon-dev
    - uses: actions/download-artifact@v4
      with:
        name: renderer-dist
        path: ./renderer/dist
    - run: npm ci
      working-directory: ./main
    - run: npx @electron/rebuild -f -w electron-overlay-window
      working-directory: ./main
    - run: npm run build
      working-directory: ./main
    - run: npx electron-builder build --linux AppImage --publish never
      working-directory: ./main
    - name: Create release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(node -p "require('./main/package.json').version")
        TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
        TAG="v${VERSION}-${TIMESTAMP}"
        gh release create "$TAG" ./main/dist/*.AppImage \
          --repo ${{ github.repository }} \
          --title "v${VERSION} (${TIMESTAMP})" \
          --notes "Linux AppImage with patched electron-overlay-window" \
          --prerelease
